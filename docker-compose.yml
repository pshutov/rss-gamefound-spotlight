services:
  app:
    build: .
    env_file: .env
    restart: unless-stopped
    ports:
      - "${PORT:-10000}:${PORT:-10000}"
    environment:
      - PORT=${PORT:-10000}
      - REPO_SLUG=${REPO_SLUG}
      - CODE_BRANCH=${CODE_BRANCH:-main}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
      - RSS_OUTPUT_PATH=${RSS_OUTPUT_PATH:-gamefound_spotlight.xml}
      - USE_DB=${USE_DB:-false}
      - GH_PAT=${GH_PAT:-}
      - CRON_TOKEN=${CRON_TOKEN}
      - GF_API=${GF_API:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - SUPABASE_BUCKET=${SUPABASE_BUCKET:-rss}
      - SUPABASE_STORAGE_PATH=${SUPABASE_STORAGE_PATH:-gamefound_spotlight.xml}
      - SUPABASE_MAX_FILE_BYTES=${SUPABASE_MAX_FILE_BYTES:-1048576}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${PORT:-10000}/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
